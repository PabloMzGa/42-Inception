name: inception

services:
  proxy:
    image: ${NGINX_IMAGE}
    container_name: ${NGINX_CONTAINER}
    pull_policy: build
    build:
      context: ./requirements/nginx
    ports:
      - 8433:433
      - 8080:80    # DEDBUG, remove later

  db:
    image: ${MARIADB_IMAGE}
    container_name: ${MARIADB_CONTAINER}
    pull_policy: build
    build:
      context: ./requirements/mariadb
    environment:
      DB_DIR: ${DB_DIR}
    secrets:
      - db_user
      - db_pass
      - db_name
    volumes:
      - db_data:/var/lib/mysql


secrets:
  db_user:
    file: ../secrets/db_user
  db_pass:
    file: ../secrets/db_pass
  db_name:
    file: ../secrets/db_name

volumes:
  db_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DB_DIR}
