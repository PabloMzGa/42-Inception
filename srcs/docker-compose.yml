name: inception

services:
  nginx:
    image: ${NGINX_IMAGE}
    container_name: ${NGINX_CONTAINER}
    pull_policy: build
    restart: always
    build:
      context: ./requirements/nginx
    ports:
      - 443:443
    volumes:
      - wp_data:/var/www/html
    environment:
    - DOMAIN=${DOMAIN}
    networks:
      - public_net
      - private_net

  mariadb:
    image: ${MARIADB_IMAGE}
    container_name: ${MARIADB_CONTAINER}
    pull_policy: build
    restart: always
    build:
      context: ./requirements/mariadb
    secrets:
      - db_user
      - db_pass
      - db_name
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - private_net

  wordpress:
    image: ${WORDPRESS_IMAGE}
    container_name: ${WORDPRESS_CONTAINER}
    pull_policy: build
    restart: always
    build:
      context: ./requirements/wordpress
    secrets:
      - db_user
      - db_pass
      - db_name
      - wp_admin_email
      - wp_admin_pass
      - wp_admin_user
      - wp_user_email
      - wp_user_pass
      - wp_user
    volumes:
      - wp_data:/var/www/html
    environment:
    - DOMAIN=${DOMAIN}
    networks:
      - private_net
    depends_on:
      - mariadb

secrets:
  db_user:
    file: ../secrets/db_user.txt
  db_pass:
    file: ../secrets/db_pass.txt
  db_name:
    file: ../secrets/db_name.txt
  wp_admin_email:
    file: ../secrets/wp_admin_email.txt
  wp_admin_pass:
    file: ../secrets/wp_admin_pass.txt
  wp_admin_user:
    file: ../secrets/wp_admin_user.txt
  wp_user_email:
    file: ../secrets/wp_user_email.txt
  wp_user_pass:
    file: ../secrets/wp_user_pass.txt
  wp_user:
    file: ../secrets/wp_user.txt

volumes:
  db_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DB_DIR}
  wp_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${WP_DIR}

networks:
  public_net:
  private_net:


