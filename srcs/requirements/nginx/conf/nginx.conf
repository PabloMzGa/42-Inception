# =========================================================
# 1. GLOBAL SETTINGS
# =========================================================

# System user that will execute Nginx
user www-data;

# Number of worker processes (Auto = 1 per CPU core)
worker_processes auto;

# File where the process PID will be stored
pid /run/nginx.pid;

# Error log location
error_log /var/log/nginx/error.log;

# Include dynamic modules for Nginx
include /etc/nginx/modules-enabled/*.conf;

# =========================================================
# 2. EVENTS BLOCK
# =========================================================
events {
    # Maximum number of simultaneous connections per worker
    worker_connections 768;
}

# =========================================================
# 3. HTTP CORE CONFIGURATION
# =========================================================
http {

    # ---------------------------------------------------------
    # Basic Settings
    # ---------------------------------------------------------

    # Optimize file transfer directly from the kernel
    sendfile on;

    # TCP optimization to send data packets in full blocks
    tcp_nopush on;

    # Maximum size of the hash tables for MIME types
    types_hash_max_size 2048;

    # Include standard MIME types mapping file
    include /etc/nginx/mime.types;

    # Default file type for unidentified extensions
    default_type application/octet-stream;

    # ---------------------------------------------------------
    # SSL Settings
    # ---------------------------------------------------------

    # Enabled protocols (Strict Inception requirement: TLSv1.3 only)
    ssl_protocols TLSv1.3;

    # Force the server to prefer its own cipher suites
    ssl_prefer_server_ciphers on;

    # ---------------------------------------------------------
    # Logging Settings
    # ---------------------------------------------------------

    # Access log location
    access_log /var/log/nginx/access.log;

    # ---------------------------------------------------------
    # Gzip Settings
    # ---------------------------------------------------------

    # Enable Gzip compression
    gzip on;

    # ---------------------------------------------------------
    # Virtual Host Configs
    # ---------------------------------------------------------

    # Include additional configuration files
    include /etc/nginx/conf.d/*.conf;

    # Include virtual host configuration files for enabled sites
    include /etc/nginx/sites-enabled/*;
}
