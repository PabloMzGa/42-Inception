[www]

; ---------------------------------------------------------
; 1. Usuario y grupo que ejecutarán PHP-FPM
; ---------------------------------------------------------
user = www-data
group = www-data

; ---------------------------------------------------------
; 2. Socket puerto para comunicarse con NGINX
; ---------------------------------------------------------

 listen = 9000

; ---------------------------------------------------------
; 3. Permisos del socket
; ---------------------------------------------------------
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

; ---------------------------------------------------------
; 4. Gestión de procesos (pm = dynamic es lo recomendado)
; ---------------------------------------------------------
pm = dynamic
pm.max_children = 20
pm.start_servers = 2
pm.min_spare_servers = 2
pm.max_spare_servers = 5

; ---------------------------------------------------------
; 5. Logs y errores
; ---------------------------------------------------------
catch_workers_output = yes
php_admin_value[error_log] = /var/log/php8.2-fpm.log
php_admin_flag[log_errors] = on

; ---------------------------------------------------------
; 6. Opciones recomendadas para WordPress
; ---------------------------------------------------------
php_admin_value[upload_max_filesize] = 64M
php_admin_value[post_max_size] = 64M
php_admin_value[max_execution_time] = 300
php_admin_value[memory_limit] = 256M
