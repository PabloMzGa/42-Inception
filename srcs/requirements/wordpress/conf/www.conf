[www]

; =========================================================
; 1. USER AND GROUP CONFIGURATION
; =========================================================
; System user and group that will execute PHP-FPM
user = www-data
group = www-data

; =========================================================
; 2. NETWORK CONFIGURATION
; =========================================================
; Port socket to communicate with Nginx
listen = 9000

; =========================================================
; 3. SOCKET PERMISSIONS
; =========================================================
; Permissions for the socket connection
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

; =========================================================
; 4. PROCESS MANAGEMENT
; =========================================================
; Dynamic process management is highly recommended for efficiency
pm = dynamic
pm.max_children = 20
pm.start_servers = 2
pm.min_spare_servers = 2
pm.max_spare_servers = 5

; =========================================================
; 5. LOGS AND ERRORS
; =========================================================
; Redirect worker stdout and stderr into main error log
catch_workers_output = yes
php_admin_value[error_log] = /var/log/php8.2-fpm.log
php_admin_flag[log_errors] = on

; =========================================================
; 6. RECOMMENDED WORDPRESS OPTIONS
; =========================================================
; Fine-tuning PHP settings to optimize WordPress performance
php_admin_value[upload_max_filesize] = 64M
php_admin_value[post_max_size] = 64M
php_admin_value[max_execution_time] = 300
php_admin_value[memory_limit] = 256M
